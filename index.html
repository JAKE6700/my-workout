<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MY WORKOUT">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<title>MY WORKOUT</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f0f;--card:#1a1a1a;--border:#2a2a2a;--text:#e8e8e8;--dim:#888;--accent:#4ade80;--accent-dim:#22633a;--push:#f472b6;--pull:#60a5fa;--legs:#fbbf24;--run:#4ade80;--danger:#ef4444;--warn:#f59e0b}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Pretendard',sans-serif;min-height:100dvh;padding-bottom:80px;overflow-x:hidden}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
button{font-family:inherit}
.tabs{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:8px 0 6px;background:none;border:none;color:var(--dim);font-size:9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:600}
.tab.active{color:var(--accent)}
.tab-icon{font-size:18px}
.page{display:none;padding:16px 16px 0}.page.active{display:block}
.header{display:flex;justify-content:space-between;align-items:center;padding:8px 0 16px}
.header h1{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.header-sub{font-size:11px;color:var(--dim);margin-top:2px}
.week-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.week-nav button{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:4px 10px}
.btn-today{background:var(--accent-dim)!important;border:1px solid var(--accent)!important;border-radius:6px;color:var(--accent)!important;font-size:11px!important;padding:4px 12px!important;font-weight:700}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px}
.day-cell{background:transparent;border:1px solid transparent;border-radius:10px;padding:8px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.day-cell.sel{background:var(--card)}.day-cell.today{border-color:var(--border)}
.day-name{font-size:10px;color:var(--dim);font-weight:500}
.day-num{font-size:15px;font-weight:400}
.day-cell.sel .day-num,.day-cell.today .day-num{font-weight:700}
.day-dot{width:6px;height:6px;border-radius:3px}
.wk-header{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.wk-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.wk-title{font-size:18px;font-weight:700}.wk-sub{font-size:12px;color:var(--dim)}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:6px}
.ex-card.timer-active{border-color:var(--accent);box-shadow:0 0 12px rgba(74,222,128,0.15)}
.ex-top{display:flex;align-items:center;gap:8px}
.ex-num{font-size:11px;color:var(--dim);font-weight:600;min-width:16px}
.ex-name{font-size:14px;font-weight:600;flex:1}
.ex-meta{display:flex;gap:12px;margin:6px 0 0 24px}.ex-meta span{font-size:12px;color:var(--dim)}
.sets-grid{margin:10px 0 0 24px;display:flex;flex-direction:column;gap:4px}
.set-row{display:flex;align-items:center;gap:6px}
.set-label{font-size:11px;color:var(--dim);min-width:36px;font-weight:600}
.set-input{width:56px;text-align:center;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;font-weight:600;padding:6px 0;outline:none}
.set-input:focus{border-color:var(--accent)}
.set-unit{font-size:10px;color:var(--dim);min-width:20px}
.set-check{width:28px;height:28px;border-radius:6px;background:var(--bg);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--accent);flex-shrink:0}
.set-check.done{background:var(--accent-dim);border-color:var(--accent)}
.timer-btn{background:var(--accent-dim);border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-size:12px;font-weight:700;padding:6px 10px;cursor:pointer;margin-left:auto;white-space:nowrap}
.timer-inline{background:var(--accent-dim);border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-size:14px;font-weight:800;padding:6px 12px;margin-left:auto;font-variant-numeric:tabular-nums;animation:pulse 1s infinite}
.timer-done-inline{background:rgba(239,68,68,0.15);border:1px solid var(--danger);border-radius:8px;color:var(--danger);font-size:12px;font-weight:800;padding:6px 12px;margin-left:auto}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
.timer-bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.timer-bar-fill{height:100%;background:var(--accent);transition:width 1s linear;border-radius:2px}
.timer-banner{position:fixed;top:0;left:0;right:0;background:var(--accent-dim);border-bottom:1px solid var(--accent);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;z-index:150}
.timer-banner-text{font-size:13px;font-weight:700;color:var(--accent)}
.timer-banner-time{font-size:20px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
.timer-banner-stop{background:none;border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-size:11px;padding:4px 10px;cursor:pointer;font-weight:600}
.run-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.run-warn{margin-top:12px;padding:8px 12px;background:#1e293b;border-radius:8px;font-size:12px;color:#94a3b8}
.upcoming{margin-top:20px}.upcoming h3{font-size:13px;font-weight:700;color:var(--dim);margin-bottom:10px;letter-spacing:0.5px}
.up-item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:4px;cursor:pointer;width:100%}
.up-dot{width:8px;height:8px;border-radius:4px;flex-shrink:0}
.up-date{font-size:12px;color:var(--dim);min-width:70px}.up-name{font-size:14px;font-weight:600}
.edit-bar{display:flex;gap:8px;margin-bottom:8px}
.edit-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--dim);font-size:12px;padding:6px 12px;cursor:pointer;font-weight:600}
.edit-btn.active{border-color:var(--warn);color:var(--warn);background:rgba(245,158,11,0.1)}
.edit-btn.save{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.ef{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:6px 8px;outline:none;width:100%}
.ef:focus{border-color:var(--warn)}.ef-sm{width:60px;text-align:center}
.erow{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap}
.elbl{font-size:10px;color:var(--dim);min-width:32px;font-weight:600}
.edel{background:none;border:1px solid var(--danger);border-radius:6px;color:var(--danger);font-size:11px;padding:4px 8px;cursor:pointer;font-weight:600;white-space:nowrap}
.emov{background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);font-size:14px;padding:2px 8px;cursor:pointer}
.add-btn{background:var(--card);border:2px dashed var(--border);border-radius:12px;padding:14px;text-align:center;color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-bottom:6px}
.nw-tog{background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);font-size:10px;padding:3px 6px;cursor:pointer}
.nw-tog.on{border-color:var(--warn);color:var(--warn)}
.pass-card{background:var(--card);border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;margin-top:12px}
.pass-card .pass-icon{font-size:36px;margin-bottom:8px}
.pass-card .pass-text{font-size:14px;color:var(--dim);margin-bottom:12px}
.pass-btn{border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;border:none}
.pass-do{background:rgba(245,158,11,0.15);color:var(--warn);border:1px solid var(--warn)!important}
.pass-undo{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent)!important}
.bw-input-row{display:flex;gap:8px;margin-bottom:16px}
.bw-input-row input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;padding:12px;outline:none}
.bw-input-row input:focus{border-color:var(--accent)}
.bw-input-row button{background:var(--accent);color:#000;border:none;border-radius:8px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.bw-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.bw-stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.bw-stat-val{font-size:22px;font-weight:800}.bw-stat-lbl{font-size:10px;color:var(--dim);margin-top:4px;font-weight:600}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.bw-log{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.bw-log-hdr{padding:12px 16px;font-size:13px;font-weight:700;color:var(--dim);border-bottom:1px solid var(--border)}
.bw-log-item{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border)}
.bw-log-item:last-child{border-bottom:none}
.bw-del{background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;padding:4px}
.setup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center}
.setup-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:340px;width:90%;text-align:center}
.setup-card h2{font-size:20px;font-weight:700;margin:8px 0}
.setup-card p{font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:20px}
.setup-card input[type=date]{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:16px;width:100%;margin-bottom:16px;outline:none}
.setup-card button{background:var(--accent);color:#000;border:none;border-radius:8px;padding:12px 0;font-size:15px;font-weight:700;width:100%;cursor:pointer}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);font-size:12px;font-weight:700;padding:6px 16px;border-radius:8px;z-index:250;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.empty{background:var(--card);border-radius:12px;padding:24px;text-align:center;border:1px solid var(--border);color:var(--dim);font-size:14px;margin-top:12px}
.settings-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);font-size:11px;padding:4px 8px;cursor:pointer}
.cov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:250;display:flex;align-items:center;justify-content:center}
.cbox{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:300px;width:90%;text-align:center}
.cbox p{font-size:14px;margin-bottom:16px;line-height:1.5}
.cbtns{display:flex;gap:8px}.cbtns button{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none}
.cbtn-no{background:var(--card);color:var(--text);border:1px solid var(--border)!important}
.cbtn-yes{background:var(--danger);color:#fff}
.dh-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.dh-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dh-name{font-size:15px;font-weight:700}
.dh-count{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
.dh-max{font-size:12px;color:var(--dim);font-weight:600}
.dh-bar{width:100%;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin:10px 0}
.dh-fill{height:100%;border-radius:4px;transition:width 0.3s}
.dh-btn{width:100%;padding:14px;border-radius:10px;border:none;font-size:16px;font-weight:800;cursor:pointer;transition:transform 0.1s}
.dh-btn:active{transform:scale(0.97)}
.dh-btn.maxed{opacity:0.4;cursor:not-allowed}
.dh-undo{background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);font-size:11px;padding:4px 10px;cursor:pointer;font-weight:600}
.dh-complete{font-size:11px;color:var(--accent);background:var(--accent-dim);padding:3px 8px;border-radius:4px;font-weight:700}
.dh-date-nav{display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:16px}
.dh-date-nav button{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:4px 10px}
.dh-date-label{font-size:16px;font-weight:700;min-width:140px;text-align:center}
.dh-streak{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;text-align:center}
.dh-streak-num{font-size:36px;font-weight:800;color:var(--accent)}
.dh-streak-lbl{font-size:12px;color:var(--dim);font-weight:600;margin-top:4px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══ CYCLE: Legs A first ═══
const DC=[
{key:"legs-a",label:"Legs A",type:"weight",sub:"대퇴사두 중심"},
{key:"run",label:"러닝",type:"run",sub:"10km"},
{key:"push-a",label:"Push A",type:"weight",sub:"복합운동 중심 + 삼두"},
{key:"run",label:"러닝",type:"run",sub:"10km"},
{key:"pull-a",label:"Pull A",type:"weight",sub:"복합운동 중심 + 이두"},
{key:"run",label:"러닝",type:"run",sub:"10km"},
{key:"legs-b",label:"Legs B",type:"weight",sub:"후면 사슬 중심"},
{key:"run",label:"러닝",type:"run",sub:"10km"},
{key:"push-b",label:"Push B",type:"weight",sub:"볼륨 중심 + 삼두"},
{key:"run",label:"러닝",type:"run",sub:"10km"},
{key:"pull-b",label:"Pull B",type:"weight",sub:"볼륨 중심 + 이두"},
{key:"run",label:"러닝",type:"run",sub:"10km"}
];
const DW={
"push-a":[{id:"pa1",name:"바벨 벤치프레스",sets:4,reps:"6-8",rest:150,defaultW:60},{id:"pa2",name:"바벨 인클라인 프레스",sets:3,reps:"8-10",rest:120,defaultW:50},{id:"pa3",name:"펙덱 플라이",sets:3,reps:"10-12",rest:90,defaultW:0},{id:"pa4",name:"케이블 레터럴 레이즈",sets:3,reps:"12-15",rest:90,defaultW:0},{id:"pa5",name:"케이블 푸시다운 (스트레이트 바)",sets:3,reps:"10-12",rest:90,defaultW:0},{id:"pa6",name:"케이블 오버헤드 익스텐션 (로프)",sets:3,reps:"10-12",rest:90,defaultW:0},{id:"pa7",name:"AB 슬라이드",sets:4,reps:"15",rest:90,defaultW:0,noWeight:true}],
"push-b":[{id:"pb1",name:"체스트 프레스 머신",sets:4,reps:"8-10",rest:120,defaultW:0},{id:"pb2",name:"스미스 인클라인 클로즈그립",sets:3,reps:"10-12",rest:120,defaultW:0},{id:"pb3",name:"케이블 크로스오버",sets:3,reps:"12-15",rest:90,defaultW:0},{id:"pb4",name:"케이블 레터럴 레이즈",sets:3,reps:"15-20",rest:90,defaultW:0},{id:"pb5",name:"딥스 머신",sets:3,reps:"10-12",rest:90,defaultW:0},{id:"pb6",name:"케이블 푸시다운 (로프)",sets:3,reps:"12-15",rest:90,defaultW:0},{id:"pb7",name:"AB 슬라이드",sets:4,reps:"15",rest:90,defaultW:0,noWeight:true}],
"pull-a":[{id:"la1",name:"T-bar 로우",sets:4,reps:"6-8",rest:150,defaultW:80},{id:"la2",name:"케이블 랫 풀다운",sets:3,reps:"10-12",rest:120,defaultW:50},{id:"la3",name:"시티드 케이블 로우",sets:3,reps:"10-12",rest:120,defaultW:40},{id:"la4",name:"리버스 펙덱 머신",sets:3,reps:"12-15",rest:90,defaultW:15},{id:"la5",name:"케이블 바이셉 컬 (스트레이트 바)",sets:3,reps:"10-12",rest:90,defaultW:20},{id:"la6",name:"케이블 해머 컬 (로프)",sets:3,reps:"10-12",rest:90,defaultW:30},{id:"la7",name:"AB 슬라이드",sets:4,reps:"15",rest:90,defaultW:0,noWeight:true}],
"pull-b":[{id:"lb1",name:"스미스 벤트오버 로우 (언더핸드)",sets:4,reps:"8-10",rest:120,defaultW:0},{id:"lb2",name:"클로즈그립 랫 풀다운",sets:3,reps:"10-12",rest:120,defaultW:0},{id:"lb3",name:"스트레이트 암 케이블 풀다운",sets:3,reps:"12-15",rest:90,defaultW:0},{id:"lb4",name:"리버스 펙덱 머신",sets:3,reps:"15-20",rest:90,defaultW:0},{id:"lb5",name:"케이블 바이셉 컬 (EZ바)",sets:3,reps:"12-15",rest:90,defaultW:0},{id:"lb6",name:"케이블 리버스 컬 (오버핸드)",sets:3,reps:"12-15",rest:90,defaultW:0},{id:"lb7",name:"AB 슬라이드",sets:4,reps:"15",rest:90,defaultW:0,noWeight:true}],
"legs-a":[{id:"ga1",name:"스미스 머신 핵 스쿼트",sets:4,reps:"6-8",rest:150,defaultW:100},{id:"ga2",name:"레그 프레스",sets:3,reps:"10-12",rest:120,defaultW:140},{id:"ga3",name:"레그 익스텐션",sets:3,reps:"12-15",rest:90,defaultW:60},{id:"ga4",name:"라잉 레그 컬",sets:3,reps:"10-12",rest:90,defaultW:35},{id:"ga5",name:"스탠딩 카프 레이즈 (스미스)",sets:4,reps:"12-15",rest:60,defaultW:60},{id:"ga6",name:"AB 슬라이드",sets:4,reps:"15",rest:90,defaultW:0,noWeight:true}],
"legs-b":[{id:"gb1",name:"스미스 스쿼트",sets:4,reps:"8-10",rest:120,defaultW:0},{id:"gb2",name:"스티프 레그 데드리프트 (바벨)",sets:3,reps:"8-10",rest:120,defaultW:0},{id:"gb3",name:"레그 컬",sets:3,reps:"12-15",rest:90,defaultW:0},{id:"gb4",name:"레그 익스텐션",sets:3,reps:"12-15",rest:90,defaultW:0},{id:"gb5",name:"시티드 카프 레이즈",sets:4,reps:"15-20",rest:60,defaultW:30},{id:"gb6",name:"AB 슬라이드",sets:4,reps:"15",rest:90,defaultW:0,noWeight:true}]
};
const HABITS=[
{id:"h1",name:"행잉 레그 레이즈",emoji:"🦵",max:100,step:20,color:"var(--push)"},
{id:"h2",name:"딥스",emoji:"💪",max:50,step:10,color:"var(--pull)"},
{id:"h3",name:"풀업",emoji:"🏋️",max:50,step:10,color:"var(--legs)"},
{id:"h4",name:"푸쉬업",emoji:"🫸",max:100,step:20,color:"var(--accent)"},
{id:"h5",name:"덤벨컬",emoji:"💪",max:50,step:10,color:"var(--warn)"}
];
const DK=["일","월","화","수","목","금","토"];

// ═══ STATE ═══
let S={sd:null,sel:new Date(),wo:0,tab:"workout",wt:{},logs:{},bw:[],wks:null,em:false,
tEnd:0,tExId:null,tSet:-1,tRest:0,tTimeout:null,tiv:null,actx:null,
setup:false,cfm:null,idc:1000,habits:{},hDate:new Date(),pass:[]};

const sv=(k,v)=>{try{localStorage.setItem("mw_"+k,JSON.stringify(v))}catch(e){}};
const ld=k=>{try{const v=localStorage.getItem("mw_"+k);return v?JSON.parse(v):null}catch(e){return null}};

function init(){
const ver=ld("ver");
// Migration: if no version or old version, update config
if(ver!==3){
sv("config",{startDate:"2026-05-01"});
sv("pass",["2026-05-03"]);
sv("ver",3);
}
const c=ld("config");
if(c?.startDate)S.sd=pD(c.startDate);else S.setup=true;
S.wt=ld("wt")||{};S.logs=ld("logs")||{};S.bw=ld("bw")||[];
S.wks=ld("cwk")||JSON.parse(JSON.stringify(DW));
S.idc=ld("idc")||1000;S.habits=ld("habits")||{};S.pass=ld("pass")||[];
// Request notification permission
if('Notification'in window&&Notification.permission==='default')try{Notification.requestPermission()}catch(e){}
}

const swk=()=>{sv("cwk",S.wks);toast("루틴 저장됨")};
const swt=()=>{sv("wt",S.wt);toast("저장됨")};
const slg=()=>sv("logs",S.logs);const sbw=()=>sv("bw",S.bw);
const scf=()=>sv("config",{startDate:dS(S.sd)});
const shb=()=>sv("habits",S.habits);const sps=()=>sv("pass",S.pass);
function nid(){S.idc++;sv("idc",S.idc);return"ex"+S.idc}

const dS=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const pD=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)};
const dd=(a,b)=>Math.floor((new Date(b.getFullYear(),b.getMonth(),b.getDate())-new Date(a.getFullYear(),a.getMonth(),a.getDate()))/864e5);
const fR=s=>s>=120?`${s/60}분`:s>=60?`${Math.floor(s/60)}분${s%60?" "+s%60+"초":""}`:`${s}초`;
const tC=k=>{if(!k)return"var(--dim)";if(k.startsWith("push"))return"var(--push)";if(k.startsWith("pull"))return"var(--pull)";if(k.startsWith("legs"))return"var(--legs)";return"var(--run)"};

// ═══ PASS SYSTEM ═══
function isPass(d){return S.pass.includes(dS(d instanceof Date?d:pD(d)))}
function addPass(d){const ds=dS(d);if(!S.pass.includes(ds)){S.pass.push(ds);S.pass.sort();sps()}}
function removePass(d){const ds=dS(d);S.pass=S.pass.filter(p=>p!==ds);sps()}

function gW(d){
if(!S.sd)return null;
const df=dd(S.sd,d);
if(df<0)return null;
const ds=dS(d);
if(S.pass.includes(ds))return{type:"pass",label:"PASS",key:"pass",sub:"운동 없음",color:"var(--dim)"};
const sdStr=dS(S.sd);
const passBefore=S.pass.filter(p=>p>=sdStr&&p<ds).length;
const effIdx=df-passBefore;
return DC[effIdx%DC.length];
}

// ═══ LOGGING ═══
function gL(d,wk,eid,si){const k=dS(d)+"_"+wk;return S.logs[k]?.[eid]?.[si]||null}
function sL(d,wk,eid,si,data){const k=dS(d)+"_"+wk;if(!S.logs[k])S.logs[k]={};if(!S.logs[k][eid])S.logs[k][eid]={};S.logs[k][eid][si]=data;slg()}

// ═══ HABITS ═══
function getH(d,hid){const k=dS(d);return S.habits[k]?.[hid]||0}
function addH(d,hid,step,max){const k=dS(d);if(!S.habits[k])S.habits[k]={};S.habits[k][hid]=Math.min((S.habits[k][hid]||0)+step,max);shb();R()}
function undoH(d,hid,step){const k=dS(d);if(!S.habits[k])return;S.habits[k][hid]=Math.max(0,(S.habits[k][hid]||0)-step);shb();R()}
function getStreak(){let s=0;const d=new Date();for(let i=0;i<365;i++){const c=new Date(d);c.setDate(d.getDate()-i);const k=dS(c);const dd=S.habits[k];if(!dd)break;if(HABITS.every(h=>(dd[h.id]||0)>=h.max))s++;else break}return s}

// ═══ TIMER (timestamp-based) ═══
function playAlarm(){
try{
const ctx=S.actx||new(window.AudioContext||window.webkitAudioContext)();
S.actx=ctx;if(ctx.state==='suspended')ctx.resume();
for(let i=0;i<5;i++){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
o.frequency.value=i%2===0?880:660;o.type='square';g.gain.value=0.2;
o.start(ctx.currentTime+i*0.25);o.stop(ctx.currentTime+i*0.25+0.15)}
}catch(e){}
}

function timerDone(){
clearInterval(S.tiv);clearTimeout(S.tTimeout);
playAlarm();
try{navigator.vibrate?.([200,100,200,100,200])}catch(e){}
if('Notification'in window&&Notification.permission==='granted')try{new Notification('MY WORKOUT',{body:'휴식 끝! 다음 세트 준비'})}catch(e){}
S.tEnd=-1;R();
setTimeout(()=>{S.tEnd=0;S.tExId=null;S.tSet=-1;R()},3000);
}

function startT(sec,exId,setIdx){
if(!S.actx)try{S.actx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}
S.tEnd=Date.now()+sec*1000;S.tExId=exId;S.tSet=setIdx;S.tRest=sec;
clearTimeout(S.tTimeout);clearInterval(S.tiv);
S.tTimeout=setTimeout(()=>{if(S.tEnd>0)timerDone()},sec*1000);
S.tiv=setInterval(()=>{if(S.tEnd>0){const rem=Math.ceil((S.tEnd-Date.now())/1000);if(rem<=0){timerDone()}else{R()}}},1000);
R();
}
function stopT(){clearInterval(S.tiv);clearTimeout(S.tTimeout);S.tEnd=0;S.tExId=null;S.tSet=-1;R()}

// Handle background return
document.addEventListener('visibilitychange',()=>{
if(!document.hidden&&S.tEnd>0){
const rem=Math.ceil((S.tEnd-Date.now())/1000);
if(rem<=0)timerDone();else R();
}
});

function toast(m){const t=document.getElementById("toast");if(t){t.textContent=m+" ✓";t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1200)}}

function tRem(){return S.tEnd>0?Math.max(0,Math.ceil((S.tEnd-Date.now())/1000)):0}
function tPct(){return S.tRest>0&&S.tEnd>0?(tRem()/S.tRest*100):0}

// ═══ RENDER ═══
function R(){
const a=document.getElementById("app");let h=`<div class="toast" id="toast"></div>`;
if(S.setup){h+=`<div class="setup-overlay"><div class="setup-card"><div style="font-size:32px;margin-bottom:8px">🏋️</div><h2>운동 시작일 설정</h2><p>첫 번째 운동 세션 날짜를 선택하세요</p><input type="date" id="sd-in" value="2026-05-01"><button id="sd-btn">시작하기</button></div></div>`;a.innerHTML=h;document.getElementById("sd-btn")?.addEventListener("click",()=>{const v=document.getElementById("sd-in").value;if(v){S.sd=pD(v);S.setup=false;scf();R()}});return}

// Timer banner (fixed top)
if(S.tEnd>0||S.tEnd===-1){
const rem=tRem();
h+=`<div class="timer-banner"><span class="timer-banner-text">⏱ 휴식 중</span><span class="timer-banner-time" style="color:${S.tEnd===-1?"var(--danger)":"var(--accent)"}">${S.tEnd===-1?"완료!":`${Math.floor(rem/60)}:${String(rem%60).padStart(2,"0")}`}</span><button class="timer-banner-stop" id="tb-stop">${S.tEnd===-1?"닫기":"중지"}</button></div>`;
h+=`<div style="height:44px"></div>`;// spacer
}

if(S.cfm)h+=`<div class="cov"><div class="cbox"><p>${S.cfm.msg}</p><div class="cbtns"><button class="cbtn-no" id="cn">취소</button><button class="cbtn-yes" id="cy">확인</button></div></div></div>`;

h+=`<div class="page ${S.tab==="workout"?"active":""}">${rWK()}</div>`;
h+=`<div class="page ${S.tab==="daily"?"active":""}">${rDH()}</div>`;
h+=`<div class="page ${S.tab==="weight"?"active":""}">${rBW()}</div>`;
h+=`<div class="tabs"><button class="tab ${S.tab==="workout"?"active":""}" data-tab="workout"><span class="tab-icon">💪</span>운동</button><button class="tab ${S.tab==="daily"?"active":""}" data-tab="daily"><span class="tab-icon">🔥</span>일상화</button><button class="tab ${S.tab==="weight"?"active":""}" data-tab="weight"><span class="tab-icon">⚖️</span>체중</button></div>`;
a.innerHTML=h;bindAll();if(S.tab==="weight")drawC()
}

function rWK(){
const td=new Date(),ts=dS(td),ss=dS(S.sel),isT=ss===ts,wk=gW(S.sel);
let h=`<div class="header"><div><h1>MY WORKOUT</h1><div class="header-sub">PPL 순환 × 러닝 교대</div></div><button class="settings-btn" id="bst">시작일 변경</button></div>`;
const ref=new Date(td);ref.setDate(ref.getDate()+S.wo*7);const dow=(ref.getDay()+6)%7,mon=new Date(ref);mon.setDate(ref.getDate()-dow);
h+=`<div class="week-nav"><button id="wp">‹</button><button ${S.wo===0?'class="btn-today"':'style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);font-size:11px;padding:4px 12px;cursor:pointer"'} id="wto">오늘</button><button id="wn">›</button></div><div class="week-grid">`;
for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);const ds=dS(d),iS=ds===ss,iT=ds===ts,w=gW(d),c=w?tC(w.key):"var(--dim)",bf=S.sd&&dd(S.sd,d)<0;
const isP=w&&w.type==="pass";
h+=`<button class="day-cell ${iS?"sel":""} ${iT?"today":""}" data-dt="${ds}" style="opacity:${bf?.3:isP?.5:1};${iS?"border-color:"+c+";background:var(--card)":""}"><span class="day-name">${DK[d.getDay()]}</span><span class="day-num" ${iT?'style="color:var(--accent)"':''}>${d.getDate()}</span>${w&&!bf?`<div class="day-dot" style="background:${isP?"var(--dim)":c}"></div>`:'<div style="height:6px"></div>'}</button>`}
h+=`</div>`;

// Date header + pass button
const canPass=wk&&S.sd&&dd(S.sd,S.sel)>=0;
h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:16px;font-weight:700">${S.sel.getMonth()+1}월 ${S.sel.getDate()}일 (${DK[S.sel.getDay()]})</span>${isT?'<span style="font-size:10px;background:var(--accent);color:#000;padding:2px 6px;border-radius:4px;font-weight:700">TODAY</span>':''}<div style="flex:1"></div>`;
if(canPass){
if(wk.type==="pass")h+=`<button class="pass-btn pass-undo" id="unpass">Pass 취소</button>`;
else h+=`<button class="pass-btn pass-do" id="dopass">운동 Pass</button>`;
}
h+=`</div>`;

if(!wk)h+=`<div class="empty">시작일 이전입니다</div>`;
else if(wk.type==="pass"){
h+=`<div class="pass-card"><div class="pass-icon">⏭️</div><div class="pass-text">이 날은 Pass 처리되었습니다.<br>이후 일정이 하루씩 밀립니다.</div></div>`;
}
else if(wk.type==="run")h+=`<div class="run-card" style="margin-top:12px"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div class="wk-icon" style="background:rgba(74,222,128,0.12)">🏃</div><div><div class="wk-title" style="color:var(--run)">러닝</div><div class="wk-sub">10km · ~6:40/km</div></div></div><div style="background:var(--bg);border-radius:8px;padding:12px"><div style="font-size:12px;color:var(--dim);margin-bottom:6px">추가 운동</div><div style="font-size:14px">AB 슬라이드 · 4×15</div></div><div class="run-warn">⚠️ 동적 워밍업 필수 (발목 부상 방지)</div></div>`;
else{
const exs=S.wks[wk.key]||[],c=tC(wk.key);
h+=`<div class="wk-header" style="margin-top:12px"><div class="wk-icon" style="background:${c}20">🏋️</div><div style="flex:1"><div class="wk-title" style="color:${c}">${wk.label}</div><div class="wk-sub">${wk.sub}</div></div></div>`;
h+=`<div class="edit-bar"><button class="edit-btn ${S.em?"active":""}" id="te">${S.em?"✏️ 편집 중":"✏️ 루틴 편집"}</button>${S.em?'<button class="edit-btn save" id="se">✓ 완료</button>':''}</div>`;
exs.forEach((ex,i)=>{
const w=S.wt[ex.id]!==undefined?S.wt[ex.id]:ex.defaultW;
const cardTimerActive=S.tEnd!==0&&S.tExId===ex.id;
if(S.em){
h+=`<div class="ex-card" style="border-color:var(--warn)"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span class="ex-num">${i+1}</span><input class="ef" value="${ex.name}" data-ei="${i}" data-f="name" style="flex:1"></div>`;
h+=`<div class="erow"><span class="elbl">세트</span><input class="ef ef-sm" type="number" inputmode="numeric" value="${ex.sets}" data-ei="${i}" data-f="sets"><span class="elbl">렙</span><input class="ef" style="width:70px" value="${ex.reps}" data-ei="${i}" data-f="reps"><span class="elbl">휴식(초)</span><input class="ef ef-sm" type="number" inputmode="numeric" value="${ex.rest}" data-ei="${i}" data-f="rest"></div>`;
h+=`<div class="erow"><span class="elbl">기본kg</span><input class="ef ef-sm" type="number" inputmode="decimal" value="${ex.defaultW}" data-ei="${i}" data-f="defaultW"><button class="nw-tog ${ex.noWeight?"on":""}" data-ei="${i}" data-f="nw">${ex.noWeight?"중량 없음 ✓":"중량 있음"}</button><div style="flex:1"></div>${i>0?`<button class="emov" data-ei="${i}" data-dr="up">↑</button>`:''}${i<exs.length-1?`<button class="emov" data-ei="${i}" data-dr="down">↓</button>`:''}<button class="edel" data-di="${i}">삭제</button></div></div>`;
}else{
h+=`<div class="ex-card ${cardTimerActive?"timer-active":""}"><div class="ex-top"><span class="ex-num">${i+1}</span><span class="ex-name">${ex.name}</span></div><div class="ex-meta"><span>${ex.sets}×${ex.reps}</span><span>휴식 ${fR(ex.rest)}</span></div><div class="sets-grid">`;
for(let s=0;s<ex.sets;s++){
const lg=gL(S.sel,wk.key,ex.id,s),sw=lg?.weight??w,sr=lg?.reps??"",dn=lg?.done;
const isThisTimer=S.tExId===ex.id&&S.tSet===s;
const rem=isThisTimer?tRem():0;
h+=`<div class="set-row"><span class="set-label">세트 ${s+1}</span>`;
if(!ex.noWeight)h+=`<input class="set-input" type="number" inputmode="decimal" placeholder="${w||"kg"}" value="${sw||""}" data-ex="${ex.id}" data-s="${s}" data-sf="weight"><span class="set-unit">kg</span>`;
h+=`<input class="set-input" type="number" inputmode="numeric" placeholder="${ex.reps}" value="${sr}" data-ex="${ex.id}" data-s="${s}" data-sf="reps" style="width:48px"><span class="set-unit">회</span><button class="set-check ${dn?"done":""}" data-ex="${ex.id}" data-s="${s}" data-sa="c">${dn?"✓":""}</button>`;
// Timer button or inline timer
if(isThisTimer&&S.tEnd===-1){h+=`<span class="timer-done-inline">완료!</span>`}
else if(isThisTimer&&S.tEnd>0){h+=`<span class="timer-inline">${Math.floor(rem/60)}:${String(rem%60).padStart(2,"0")}</span>`}
else{h+=`<button class="timer-btn" data-rs="${ex.rest}" data-tex="${ex.id}" data-ts="${s}">⏱</button>`}
h+=`</div>`}
// Timer progress bar
if(cardTimerActive&&S.tEnd>0){h+=`<div class="timer-bar"><div class="timer-bar-fill" style="width:${tPct()}%"></div></div>`}
h+=`</div></div>`}
});
if(S.em)h+=`<button class="add-btn" data-wk="${wk.key}">+ 운동 추가</button>`
}
// Upcoming
h+=`<div class="upcoming"><h3>다음 예정</h3>`;
for(let i=1;i<=4;i++){const d=new Date(S.sel);d.setDate(d.getDate()+i);const w=gW(d);if(!w)continue;const c=tC(w.key);const isP=w.type==="pass";
h+=`<button class="up-item" data-dt="${dS(d)}" style="${isP?"opacity:0.5":""}"><div class="up-dot" style="background:${isP?"var(--dim)":c}"></div><span class="up-date">${d.getMonth()+1}/${d.getDate()} (${DK[d.getDay()]})</span><span class="up-name" style="color:${isP?"var(--dim)":c}">${w.label}</span>${w.type==="run"?'<span style="font-size:11px;color:var(--dim);margin-left:auto">10km</span>':''}</button>`}
h+=`</div>`;return h
}

function rDH(){
const hd=S.hDate,hds=dS(hd),tds=dS(new Date()),isT=hds===tds,streak=getStreak(),allDone=HABITS.every(h=>getH(hd,h.id)>=h.max);
let h=`<div class="header"><div><h1>운동의 일상화</h1><div class="header-sub">매일 꾸준히, 한 세트씩</div></div></div>`;
h+=`<div class="dh-date-nav"><button id="hd-prev">‹</button><span class="dh-date-label">${hd.getMonth()+1}월 ${hd.getDate()}일 (${DK[hd.getDay()]}) ${isT?"<span style='font-size:10px;background:var(--accent);color:#000;padding:2px 6px;border-radius:4px;font-weight:700;margin-left:4px'>TODAY</span>":""}</span><button id="hd-next">›</button></div>`;
h+=`<div class="dh-streak"><div class="dh-streak-num">${streak}</div><div class="dh-streak-lbl">연속 달성일</div></div>`;
if(allDone)h+=`<div style="background:var(--accent-dim);border:1px solid var(--accent);border-radius:12px;padding:14px;text-align:center;margin-bottom:12px;font-size:14px;font-weight:700;color:var(--accent)">🎉 오늘 모든 운동 완료!</div>`;
HABITS.forEach(hab=>{const cur=getH(hd,hab.id),pct=Math.min(100,cur/hab.max*100),mx=cur>=hab.max;
h+=`<div class="dh-card"><div class="dh-top"><div><span style="font-size:18px;margin-right:6px">${hab.emoji}</span><span class="dh-name">${hab.name}</span></div><div style="display:flex;align-items:center;gap:6px">${mx?'<span class="dh-complete">완료</span>':""}${cur>0?`<button class="dh-undo" data-hu="${hab.id}" data-hs="${hab.step}">−${hab.step}</button>`:""}</div></div><div style="display:flex;align-items:baseline;gap:4px"><span class="dh-count" style="color:${mx?"var(--accent)":hab.color}">${cur}</span><span class="dh-max">/ ${hab.max}개</span></div><div class="dh-bar"><div class="dh-fill" style="width:${pct}%;background:${mx?"var(--accent)":hab.color}"></div></div><button class="dh-btn ${mx?"maxed":""}" style="background:${mx?"var(--border)":hab.color+"22"};color:${mx?"var(--dim)":hab.color}" data-ha="${hab.id}" data-hs="${hab.step}" data-hm="${hab.max}" ${mx?"disabled":""}>${mx?"완료 ✓":`+${hab.step}개 (1세트)`}</button></div>`});
return h
}

function rBW(){
const sorted=[...S.bw].sort((a,b)=>b.date.localeCompare(a.date)),lt=sorted[0],st=sorted[sorted.length-1];
const wa=new Date();wa.setDate(wa.getDate()-7);const ws=dS(wa),rw=sorted.filter(e=>e.date>=ws);
const avg=rw.length?(rw.reduce((s,e)=>s+e.weight,0)/rw.length).toFixed(1):"—";
let h=`<div class="header"><div><h1>체중 추적</h1><div class="header-sub">매일 기상 공복 측정</div></div></div>`;
h+=`<div class="bw-input-row"><input type="date" id="bwd" value="${dS(new Date())}"><input type="number" id="bwv" inputmode="decimal" placeholder="체중 (kg)" step="0.1"><button id="bwa">기록</button></div>`;
h+=`<div class="bw-stats"><div class="bw-stat"><div class="bw-stat-val">${lt?lt.weight:"—"}</div><div class="bw-stat-lbl">최근 (kg)</div></div><div class="bw-stat"><div class="bw-stat-val">${avg}</div><div class="bw-stat-lbl">주간 평균</div></div><div class="bw-stat"><div class="bw-stat-val" style="color:${st&&lt&&lt.weight<st.weight?"var(--accent)":"var(--text)"}">${st&&lt?(lt.weight-st.weight).toFixed(1):"—"}</div><div class="bw-stat-lbl">총 변화</div></div></div>`;
h+=`<div class="chart-box"><canvas id="ch" height="200"></canvas></div>`;
h+=`<div class="bw-log"><div class="bw-log-hdr">기록 (${sorted.length}일)</div>`;
sorted.slice(0,30).forEach((e,i)=>{const prev=sorted[i+1],df=prev?(e.weight-prev.weight).toFixed(1):null;const d=pD(e.date);
h+=`<div class="bw-log-item"><span style="font-size:13px;color:var(--dim)">${d.getMonth()+1}/${d.getDate()} (${DK[d.getDay()]})</span><div style="display:flex;align-items:center;gap:8px"><span style="font-size:15px;font-weight:700">${e.weight}kg</span>${df?`<span style="font-size:11px;padding:2px 6px;border-radius:4px;font-weight:600;background:${parseFloat(df)<=0?"var(--accent-dim)":"rgba(239,68,68,0.2)"};color:${parseFloat(df)<=0?"var(--accent)":"var(--danger)"}">${parseFloat(df)>0?"+":""}${df}</span>`:""}<button class="bw-del" data-bd="${e.date}">✕</button></div></div>`});
h+=`</div>`;return h
}

function drawC(){
const cv=document.getElementById("ch");if(!cv||S.bw.length<2)return;
const ctx=cv.getContext("2d"),rect=cv.parentElement.getBoundingClientRect();cv.width=rect.width-32;cv.height=200;
const w=cv.width,ht=cv.height,sorted=[...S.bw].sort((a,b)=>a.date.localeCompare(b.date)),vals=sorted.map(e=>e.weight),mn=Math.min(...vals)-1,mx=Math.max(...vals)+1,rng=mx-mn||1,px=40,py=20,cw=w-px-10,ch=ht-py*2;
ctx.clearRect(0,0,w,ht);ctx.strokeStyle="#2a2a2a";ctx.lineWidth=1;
for(let i=0;i<=5;i++){const y=py+ch-ch*(i/5);ctx.beginPath();ctx.moveTo(px,y);ctx.lineTo(w-10,y);ctx.stroke();ctx.fillStyle="#888";ctx.font="10px -apple-system,sans-serif";ctx.textAlign="right";ctx.fillText((mn+rng*(i/5)).toFixed(1),px-4,y+3)}
ctx.strokeStyle="#4ade80";ctx.lineWidth=2;ctx.beginPath();
sorted.forEach((e,i)=>{const x=px+(i/(sorted.length-1))*cw,y=py+ch-((e.weight-mn)/rng)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
ctx.stroke();ctx.lineTo(px+cw,py+ch);ctx.lineTo(px,py+ch);ctx.closePath();ctx.fillStyle="rgba(74,222,128,0.08)";ctx.fill();
sorted.forEach((e,i)=>{const x=px+(i/(sorted.length-1))*cw,y=py+ch-((e.weight-mn)/rng)*ch;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle="#4ade80";ctx.fill()});
ctx.fillStyle="#888";ctx.font="9px -apple-system,sans-serif";ctx.textAlign="center";
if(sorted.length>1){const f=pD(sorted[0].date),l=pD(sorted[sorted.length-1].date);ctx.fillText(`${f.getMonth()+1}/${f.getDate()}`,px,ht-4);ctx.fillText(`${l.getMonth()+1}/${l.getDate()}`,px+cw,ht-4)}
}

// ═══ EVENTS ═══
function bindAll(){
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{S.tab=t.dataset.tab;S.em=false;R()}));
document.getElementById("bst")?.addEventListener("click",()=>{S.setup=true;R()});
document.getElementById("wp")?.addEventListener("click",()=>{S.wo--;R()});
document.getElementById("wn")?.addEventListener("click",()=>{S.wo++;R()});
document.getElementById("wto")?.addEventListener("click",()=>{S.wo=0;S.sel=new Date();R()});
document.querySelectorAll("[data-dt]").forEach(el=>el.addEventListener("click",()=>{S.sel=pD(el.dataset.dt);R()}));

// Set logging
document.querySelectorAll("[data-sf]").forEach(inp=>inp.addEventListener("change",()=>{
const wk=gW(S.sel);if(!wk||wk.type!=="weight")return;const ex=gL(S.sel,wk.key,inp.dataset.ex,+inp.dataset.s)||{};
ex[inp.dataset.sf]=parseFloat(inp.value)||0;sL(S.sel,wk.key,inp.dataset.ex,+inp.dataset.s,ex);
if(inp.dataset.sf==="weight"){S.wt[inp.dataset.ex]=parseFloat(inp.value)||0;swt()}
}));
document.querySelectorAll("[data-sa=c]").forEach(b=>b.addEventListener("click",()=>{
const wk=gW(S.sel);if(!wk||wk.type!=="weight")return;const ex=gL(S.sel,wk.key,b.dataset.ex,+b.dataset.s)||{};ex.done=!ex.done;sL(S.sel,wk.key,b.dataset.ex,+b.dataset.s,ex);R()
}));

// Timer buttons (inline)
document.querySelectorAll("[data-rs]").forEach(b=>b.addEventListener("click",()=>startT(+b.dataset.rs,b.dataset.tex,+b.dataset.ts)));
document.getElementById("tb-stop")?.addEventListener("click",stopT);

// Edit mode
document.getElementById("te")?.addEventListener("click",()=>{S.em=!S.em;R()});
document.getElementById("se")?.addEventListener("click",()=>{S.em=false;R()});
document.querySelectorAll("[data-f]").forEach(inp=>{
if(inp.dataset.f==="nw"){inp.addEventListener("click",()=>{const wk=gW(S.sel);if(!wk)return;S.wks[wk.key][+inp.dataset.ei].noWeight=!S.wks[wk.key][+inp.dataset.ei].noWeight;swk();R()})}
else{inp.addEventListener("change",()=>{const wk=gW(S.sel);if(!wk)return;let v=inp.value;if(["sets","rest","defaultW"].includes(inp.dataset.f))v=parseFloat(v)||0;if(inp.dataset.f==="sets")v=Math.max(1,Math.min(10,v));S.wks[wk.key][+inp.dataset.ei][inp.dataset.f]=v;swk()})}
});
document.querySelectorAll("[data-dr]").forEach(b=>b.addEventListener("click",()=>{
const wk=gW(S.sel);if(!wk)return;const i=+b.dataset.ei,a=S.wks[wk.key],ni=b.dataset.dr==="up"?i-1:i+1;
if(ni<0||ni>=a.length)return;[a[i],a[ni]]=[a[ni],a[i]];swk();R()
}));
document.querySelectorAll("[data-di]").forEach(b=>b.addEventListener("click",()=>{
const wk=gW(S.sel);if(!wk)return;const nm=S.wks[wk.key][+b.dataset.di].name;
S.cfm={msg:`"${nm}"을(를) 삭제하시겠습니까?`,action:()=>{S.wks[wk.key].splice(+b.dataset.di,1);swk();S.cfm=null;R()}};R()
}));
document.querySelectorAll("[data-wk]").forEach(b=>b.addEventListener("click",()=>{S.wks[b.dataset.wk].push({id:nid(),name:"새 운동",sets:3,reps:"10-12",rest:90,defaultW:0});swk();R()}));

// Confirm
document.getElementById("cy")?.addEventListener("click",()=>{S.cfm?.action?.()});
document.getElementById("cn")?.addEventListener("click",()=>{S.cfm=null;R()});

// Pass buttons
document.getElementById("dopass")?.addEventListener("click",()=>{
S.cfm={msg:`${S.sel.getMonth()+1}월 ${S.sel.getDate()}일을 Pass 처리하시겠습니까? 이후 일정이 하루씩 밀립니다.`,action:()=>{addPass(S.sel);S.cfm=null;R()}};R()
});
document.getElementById("unpass")?.addEventListener("click",()=>{removePass(S.sel);R()});

// Body weight
document.getElementById("bwa")?.addEventListener("click",()=>{const d=document.getElementById("bwd").value,v=parseFloat(document.getElementById("bwv").value);if(!d||isNaN(v))return;S.bw=S.bw.filter(e=>e.date!==d);S.bw.push({date:d,weight:v});sbw();R()});
document.querySelectorAll("[data-bd]").forEach(b=>b.addEventListener("click",()=>{S.bw=S.bw.filter(e=>e.date!==b.dataset.bd);sbw();R()}));

// Daily habits
document.getElementById("hd-prev")?.addEventListener("click",()=>{S.hDate=new Date(S.hDate);S.hDate.setDate(S.hDate.getDate()-1);R()});
document.getElementById("hd-next")?.addEventListener("click",()=>{const t=new Date(S.hDate);t.setDate(t.getDate()+1);if(t<=new Date()){S.hDate=t;R()}});
document.querySelectorAll("[data-ha]").forEach(b=>b.addEventListener("click",()=>{addH(S.hDate,b.dataset.ha,+b.dataset.hs,+b.dataset.hm)}));
document.querySelectorAll("[data-hu]").forEach(b=>b.addEventListener("click",()=>{undoH(S.hDate,b.dataset.hu,+b.dataset.hs)}));
}

init();R()
</script>
