<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MY WORKOUT">
<meta name="theme-color" content="#0b0d12">
<meta name="mobile-web-app-capable" content="yes">
<title>MY WORKOUT</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23e3b45c' stroke-width='2' stroke-linecap='round'><path d='M6.5 8.5v7M17.5 8.5v7M3.5 10.5v3M20.5 10.5v3M6.5 12h11'/></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0b0d12;--card:#151922;--card2:#1d222c;--border:#272e3a;--border-lt:#39424f;
--text:#e7eaf0;--dim:#7b8593;
--accent:#e3b45c;--ad:#3b2f16;
--push:#6ea8fe;--pull:#7dd3fc;--legs:#a78bfa;--run:#3fcfa8;
--warn:#d9884e;--danger:#e2606a;
--sans:-apple-system,BlinkMacSystemFont,'Pretendard Variable',Pretendard,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',Roboto,sans-serif;
--r:12px;--rl:16px;--rs:8px;--sh:0 1px 2px rgba(0,0,0,.45)}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100dvh;padding-bottom:88px;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;color:inherit}
input{font-family:inherit}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
/* nav */
.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(11,13,18,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:11px 0 9px;background:none;border:none;color:var(--dim);font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;font-weight:600;letter-spacing:-.2px;transition:color .15s}
.tab.active{color:var(--accent)}
.tab-icon{width:21px;height:21px;display:block}
.tab-icon svg{width:100%;height:100%;display:block}
.page{display:none;padding:18px 16px 0}.page.active{display:block}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;padding:2px 0 18px;gap:12px}
.hdr h1{font-size:19px;font-weight:800;letter-spacing:-.6px}
.hdr-sub{font-size:11px;color:var(--dim);margin-top:3px}
/* week strip */
.wn{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.wn button{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:6px 12px;line-height:1}
.bt{background:var(--ad)!important;border:1px solid var(--accent)!important;border-radius:var(--rs);color:var(--accent)!important;font-size:11px!important;padding:5px 12px!important;font-weight:700}
.wg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:18px}
.dc{background:transparent;border:1px solid transparent;border-radius:var(--r);padding:9px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:background .15s}
.dc.sel{background:var(--card)}.dc.tod{border-color:var(--border-lt)}
.dn{font-size:10px;color:var(--dim);font-weight:600}
.dnum{font-size:15px;font-weight:500;font-variant-numeric:tabular-nums}
.dc.sel .dnum,.dc.tod .dnum{font-weight:700}
.ddot{width:5px;height:5px;border-radius:3px}
/* day header */
.wh{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:13px;box-shadow:var(--sh)}
.wi{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;letter-spacing:-.5px;flex-shrink:0;background:var(--card2);border:1px solid currentColor}
.wtl{font-size:17px;font-weight:700;letter-spacing:-.3px}
.wsu{font-size:12px;color:var(--dim);margin-top:1px}
.runbar{background:var(--card);border:1px solid var(--border);border-left:2px solid var(--run);border-radius:var(--rs);padding:9px 13px;margin:8px 0;font-size:12px;color:var(--dim);font-weight:600;display:flex;align-items:center;gap:8px}
/* exercises */
.ec{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px;margin-bottom:7px;transition:border-color .2s}
.ec.ta{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset,0 4px 18px rgba(227,180,92,.09)}
.et{display:flex;align-items:center;gap:9px}
.en{font-size:10px;color:var(--dim);font-weight:700;min-width:14px;font-variant-numeric:tabular-nums}
.enm{font-size:14px;font-weight:600;flex:1;letter-spacing:-.2px;word-break:keep-all}
.em{display:flex;gap:10px;margin:7px 0 0 23px;flex-wrap:wrap}
.em span{font-size:11px;color:var(--dim)}
.sg{margin:11px 0 0 23px;display:flex;flex-direction:column;gap:5px}
.sr{display:flex;align-items:center;gap:6px}
.sl{font-size:11px;color:var(--dim);min-width:36px;font-weight:600}
.si{width:56px;text-align:center;background:var(--card2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:14px;font-weight:600;padding:7px 0;outline:none;font-variant-numeric:tabular-nums;transition:border-color .15s}
.si:focus{border-color:var(--accent);background:#232935}
.si::placeholder{color:#525b68}
.ri{width:54px;text-align:center;background:var(--card2);border:1px solid var(--border-lt);border-radius:var(--rs);color:var(--text);font-size:13px;font-weight:700;padding:4px 0;outline:none;font-variant-numeric:tabular-nums}
.ri:focus{border-color:var(--run)}
.su{font-size:10px;color:var(--dim);min-width:18px}
.sc{width:30px;height:30px;border-radius:var(--rs);background:var(--card2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--accent);flex-shrink:0;transition:background .15s,border-color .15s}
.sc.done{background:var(--ad);border-color:var(--accent)}
/* timer */
.tb{background:var(--card2);border:1px solid var(--border);border-radius:var(--rs);color:var(--dim);font-size:12px;font-weight:700;padding:6px 10px;cursor:pointer;margin-left:auto;white-space:nowrap}
.ti{background:var(--ad);border:1px solid var(--accent);border-radius:var(--rs);color:var(--accent);font-size:14px;font-weight:800;padding:6px 12px;margin-left:auto;font-variant-numeric:tabular-nums;animation:pu 1.6s ease-in-out infinite}
.td{background:rgba(226,96,106,.14);border:1px solid var(--danger);border-radius:var(--rs);color:var(--danger);font-size:12px;font-weight:800;padding:6px 12px;margin-left:auto}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.55}}
.tbar{height:2px;background:var(--border);border-radius:2px;margin-top:9px;overflow:hidden}
.tbf{height:100%;background:var(--accent);transition:width 1s linear;border-radius:2px}
.tbn{position:fixed;top:0;left:0;right:0;background:rgba(21,25,34,.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--accent);padding:9px 16px;display:flex;justify-content:space-between;align-items:center;z-index:150}
.tbt{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.3px}
.tbti{font-size:21px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.tbs{background:none;border:1px solid var(--border-lt);border-radius:var(--rs);color:var(--dim);font-size:11px;padding:5px 11px;cursor:pointer;font-weight:600}
/* cardio day */
.rc{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:20px;box-shadow:var(--sh)}
.rw{margin-top:14px;padding:10px 13px;background:var(--card2);border-radius:var(--rs);font-size:12px;color:var(--dim);word-break:keep-all}
/* upcoming */
.up{margin-top:22px}
.up h3{font-size:10px;font-weight:700;color:var(--dim);margin-bottom:9px;letter-spacing:1.4px}
.ui{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:5px;cursor:pointer;width:100%;text-align:left}
.ud{width:7px;height:7px;border-radius:4px;flex-shrink:0}
.udt{font-size:12px;color:var(--dim);min-width:72px;font-variant-numeric:tabular-nums}
.unm{font-size:14px;font-weight:600;letter-spacing:-.2px}
/* edit mode */
.eb{display:flex;gap:8px;margin-bottom:9px}
.ebt{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--dim);font-size:12px;padding:7px 13px;cursor:pointer;font-weight:600}
.ebt.active{border-color:var(--warn);color:var(--warn);background:rgba(217,136,78,.1)}
.ebt.save{border-color:var(--accent);color:var(--accent);background:var(--ad)}
.ef{background:var(--card2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:13px;padding:7px 9px;outline:none;width:100%}
.ef:focus{border-color:var(--warn)}
.efs{width:62px;text-align:center;font-variant-numeric:tabular-nums}
.erw{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap}
.elb{font-size:10px;color:var(--dim);min-width:32px;font-weight:600}
.edl{background:none;border:1px solid rgba(226,96,106,.5);border-radius:var(--rs);color:var(--danger);font-size:11px;padding:5px 9px;cursor:pointer;font-weight:600;white-space:nowrap}
.emv{background:var(--card2);border:1px solid var(--border);border-radius:var(--rs);color:var(--dim);font-size:13px;padding:3px 9px;cursor:pointer}
.adb{background:none;border:1.5px dashed var(--border-lt);border-radius:var(--r);padding:15px;text-align:center;color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-bottom:6px}
.nwt{background:var(--card2);border:1px solid var(--border);border-radius:var(--rs);color:var(--dim);font-size:10px;padding:4px 7px;cursor:pointer}
.nwt.on{border-color:var(--warn);color:var(--warn)}
.pb{border-radius:var(--rs);padding:7px 15px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid transparent}
.pbd{background:rgba(217,136,78,.12);color:var(--warn);border-color:var(--warn)!important}
.pbu{background:var(--ad);color:var(--accent);border-color:var(--accent)!important}
/* bodyweight */
.bwi{display:flex;gap:8px;margin-bottom:16px}
.bwi input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;padding:12px;outline:none;min-width:0}
.bwi input:focus{border-color:var(--accent)}
.bwi button{background:var(--accent);color:#12141a;border:none;border-radius:var(--r);padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.bws{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.bwst{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 8px;text-align:center;box-shadow:var(--sh)}
.bwsv{font-size:21px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.6px}
.bwsl{font-size:10px;color:var(--dim);margin-top:4px;font-weight:600}
.cb{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:16px}
.bwl{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.bwlh{padding:13px 16px;font-size:10px;font-weight:700;color:var(--dim);border-bottom:1px solid var(--border);letter-spacing:1.2px}
.bwli{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border)}
.bwli:last-child{border-bottom:none}
.bwd{background:none;border:none;color:#4d5663;font-size:15px;cursor:pointer;padding:4px 2px}
/* setup / overlays */
.so{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.soc{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:30px 26px;max-width:340px;width:100%;text-align:center}
.soc h2{font-size:19px;font-weight:700;margin:6px 0 8px;letter-spacing:-.4px}
.soc p{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:20px;word-break:keep-all}
.soc input[type=date]{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;font-size:15px;width:100%;margin-bottom:14px;outline:none;font-family:inherit}
.soc button{background:var(--accent);color:#12141a;border:none;border-radius:var(--r);padding:13px 0;font-size:15px;font-weight:700;width:100%;cursor:pointer}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--card);border:1px solid var(--accent);color:var(--accent);font-size:12px;font-weight:700;padding:8px 16px;border-radius:var(--rs);z-index:250;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ety{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:26px;text-align:center;color:var(--dim);font-size:13px;margin-top:12px}
.stb{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--dim);font-size:11px;padding:6px 10px;cursor:pointer;font-weight:600;white-space:nowrap}
.cov{position:fixed;inset:0;background:rgba(5,6,9,.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:250;display:flex;align-items:center;justify-content:center;padding:20px}
.cbox{background:var(--card);border:1px solid var(--border-lt);border-radius:var(--rl);padding:24px;max-width:300px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.cbox p{font-size:14px;margin-bottom:18px;line-height:1.55;word-break:keep-all}
.cbts{display:flex;gap:8px}
.cbts button{flex:1;padding:11px;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;border:1px solid transparent}
.cbn{background:var(--card2);color:var(--text);border-color:var(--border)!important}
.cby{background:var(--danger);color:#fff}
/* habits */
.dhc{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:10px;box-shadow:var(--sh)}
.dht{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dhn{font-size:14px;font-weight:700;letter-spacing:-.2px}
.dhct{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.8px}
.dhm{font-size:12px;color:var(--dim);font-weight:600}
.dhb{width:100%;height:6px;background:var(--card2);border-radius:3px;overflow:hidden;margin:10px 0}
.dhf{height:100%;border-radius:3px;transition:width .35s cubic-bezier(.4,0,.2,1)}
.dhbt{width:100%;padding:14px;border-radius:var(--r);border:1px solid transparent;font-size:15px;font-weight:700;cursor:pointer;transition:transform .1s;background:var(--card2)}
.dhbt:active{transform:scale(.98)}
.dhbt.mx{opacity:.4;cursor:not-allowed}
.dhud{background:var(--card2);border:1px solid var(--border);border-radius:var(--rs);color:var(--dim);font-size:11px;padding:4px 10px;cursor:pointer;font-weight:600}
.dhcp{font-size:10px;color:var(--accent);background:var(--ad);padding:3px 8px;border-radius:5px;font-weight:700}
.dhdnv{display:flex;justify-content:center;align-items:center;gap:14px;margin-bottom:16px}
.dhdnv button{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:5px 11px}
.dhdl{font-size:15px;font-weight:700;min-width:150px;text-align:center;letter-spacing:-.2px}
.dhsk{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:16px;text-align:center;box-shadow:var(--sh)}
.dhskn{font-size:38px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:-1.5px;line-height:1}
.dhskl{font-size:11px;color:var(--dim);font-weight:600;margin-top:6px;letter-spacing:.4px}
/* session */
.sess{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:15px 16px;margin-bottom:8px;box-shadow:var(--sh)}
.sess-time{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;text-align:center;margin:6px 0;letter-spacing:-1px}
.sess-btns{display:flex;gap:8px;justify-content:center}
.sess-btn{padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;border:1px solid transparent}
.sess-start{background:var(--accent);color:#12141a}
.sess-rest{background:rgba(217,136,78,.14);color:var(--warn);border-color:var(--warn)!important}
.sess-resume{background:var(--ad);color:var(--accent);border-color:var(--accent)!important}
.sess-end{background:rgba(226,96,106,.12);color:var(--danger);border-color:rgba(226,96,106,.55)!important}
.sess-stat{display:flex;justify-content:space-around;margin-top:10px;font-size:11px;color:var(--dim)}
.sess-stat span{text-align:center}
.sess-stat strong{display:block;font-size:15px;color:var(--text);font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px}
.cal-hdr{text-align:center;font-size:10px;color:var(--dim);font-weight:600;padding:5px 0}
.cal-day{text-align:center;padding:7px 2px;border-radius:var(--rs);cursor:pointer;font-size:12px;min-height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-variant-numeric:tabular-nums;border:1px solid transparent}
.cal-day.has{background:var(--card)}
.cal-day.csel{border-color:var(--accent)}
.cal-day.empty{cursor:default}
.cal-dots{display:flex;gap:2px}
.cal-dot{width:4px;height:4px;border-radius:2px}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-nav button{background:none;border:none;color:var(--dim);font-size:17px;cursor:pointer;padding:5px 11px}
.cal-nav span{font-size:15px;font-weight:700;letter-spacing:-.3px}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:15px;margin-bottom:8px;box-shadow:var(--sh)}
.hist-title{font-size:14px;font-weight:700;margin-bottom:5px;letter-spacing:-.2px}
.hist-detail{font-size:12px;color:var(--dim)}
.hist-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.hist-btn{background:var(--card2);border:1px solid var(--border);border-radius:var(--rs);color:var(--dim);font-size:11px;padding:5px 11px;cursor:pointer;font-weight:600}
.hist-btn.active{border-color:var(--accent);color:var(--accent);background:var(--ad)}
/* goals */
.goals{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:15px 16px;margin-bottom:12px;box-shadow:var(--sh)}
.goals-title{font-size:10px;font-weight:700;color:var(--dim);margin-bottom:12px;letter-spacing:1.4px}
.goal-row{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.goal-row:last-child{margin-bottom:0}
.goal-name{font-size:12px;font-weight:600;min-width:50px;letter-spacing:-.2px}
.goal-bar{flex:1;height:5px;background:var(--card2);border-radius:3px;overflow:hidden}
.goal-fill{height:100%;border-radius:3px;transition:width .35s cubic-bezier(.4,0,.2,1)}
.goal-nums{font-size:11px;color:var(--dim);font-weight:600;min-width:78px;text-align:right;font-variant-numeric:tabular-nums}
.goal-pct{font-size:10px;font-weight:700;min-width:32px;text-align:right;font-variant-numeric:tabular-nums}
.prog-badge{display:inline-block;font-size:9px;font-weight:700;padding:3px 7px;border-radius:5px;margin-left:7px;white-space:nowrap}
.prog-up{background:var(--ad);color:var(--accent);border:1px solid rgba(227,180,92,.5)}
.prog-keep{background:rgba(125,211,252,.1);color:var(--pull);border:1px solid rgba(125,211,252,.3)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const DC=[
{key:"upperA",label:"상체 A",type:"weight",sub:"가슴 강조",run:7},
{key:"lowerA",label:"하체 A",type:"weight",sub:"스쿼트 강조",run:7},
{key:"cardio",label:"유산소",type:"rest",sub:"러닝 4km + 걷기 3km",run:7},
{key:"upperB",label:"상체 B",type:"weight",sub:"등 강조",run:7},

function checkReady(exId,wkKey){

const logKeys=Object.keys(S.logs).filter(k=>k.endsWith("_"+wkKey));

logKeys.sort().reverse();

function drawC(){const cv=document.getElementById("ch");if(!cv||S.bw.length<2)return;
const ctx=cv.getContext("2d"),rect=cv.parentElement.getBoundingClientRect();cv.width=rect.width-32;cv.height=200;
const w=cv.width,ht=cv.height,sorted=[...S.bw].sort((a,b)=>a.date.localeCompare(b.date)),vals=sorted.map(e=>e.weight),mn=Math.min(...vals)-1,mx=Math.max(...vals)+1,rng=mx-mn||1,px=40,py=20,cw=w-px-10,ch=ht-py*2;
ctx.clearRect(0,0,w,ht);ctx.strokeStyle="#272e3a";ctx.lineWidth=1;
for(let i=0;i<=5;i++){const y=py+ch-ch*(i/5);ctx.beginPath();ctx.moveTo(px,y);ctx.lineTo(w-10,y);ctx.stroke();ctx.fillStyle="#7b8593";ctx.font="10px -apple-system,sans-serif";ctx.textAlign="right";ctx.fillText((mn+rng*(i/5)).toFixed(1),px-4,y+3)}
ctx.strokeStyle="#e3b45c";ctx.lineWidth=2;ctx.beginPath();
sorted.forEach((e,i)=>{const x=px+(i/(sorted.length-1))*cw,y=py+ch-((e.weight-mn)/rng)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
ctx.stroke();ctx.lineTo(px+cw,py+ch);ctx.lineTo(px,py+ch);ctx.closePath();ctx.fillStyle="rgba(227,180,92,0.09)";ctx.fill();
sorted.forEach((e,i)=>{const x=px+(i/(sorted.length-1))*cw,y=py+ch-((e.weight-mn)/rng)*ch;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle="#e3b45c";ctx.fill()});
ctx.fillStyle="#7b8593";ctx.font="9px -apple-system,sans-serif";ctx.textAlign="center";
if(sorted.length>1){const f=pD(sorted[0].date),l=pD(sorted[sorted.length-1].date);ctx.fillText(`${f.getMonth()+1}/${f.getDate()}`,px,ht-4);ctx.fillText(`${l.getMonth()+1}/${l.getDate()}`,px+cw,ht-4)}}

document.getElementById("cy")?.addEventListener("click",()=>{S.cfm?.action?.()});
document.getElementById("cn")?.addEventListener("click",()=>{S.cfm=null;R()});
document.getElementById("dopass")?.addEventListener("click",()=>{S.cfm={msg:`${S.sel.getMonth()+1}월 ${S.sel.getDate()}일 Pass?`,action:()=>{const ds=dS(S.sel);if(!S.pass.includes(ds)){S.pass.push(ds);S.pass.sort();sps()}S.cfm=null;R()}};R()});
document.getElementById("unpass")?.addEventListener("click",()=>{S.pass=S.pass.filter(p=>p!==dS(S.sel));sps();R()});
document.querySelectorAll("[data-sa]").forEach(b=>b.addEventListener("click",()=>{const a=b.dataset.sa;if(a==="start")startSess(S.sel);else if(a==="rest")restSess(S.sel);else if(a==="resume")resumeSess(S.sel);else if(a==="end")endSess(S.sel)}));
document.getElementById("bwa")?.addEventListener("click",()=>{const d=document.getElementById("bwd").value,v=parseFloat(document.getElementById("bwv").value);if(!d||isNaN(v))return;S.bw=S.bw.filter(e=>e.date!==d);S.bw.push({date:d,weight:v});sbw();R()});
document.querySelectorAll("[data-bd]").forEach(b=>b.addEventListener("click",()=>{S.bw=S.bw.filter(e=>e.date!==b.dataset.bd);sbw();R()}));
document.getElementById("hp")?.addEventListener("click",()=>{S.hDate=new Date(S.hDate);S.hDate.setDate(S.hDate.getDate()-1);R()});
document.getElementById("hn")?.addEventListener("click",()=>{const t=new Date(S.hDate);t.setDate(t.getDate()+1);if(t<=new Date()){S.hDate=t;R()}});
document.querySelectorAll("[data-ha]").forEach(b=>b.addEventListener("click",()=>{addH(S.hDate,b.dataset.ha,+b.dataset.hs,+b.dataset.hm)}));
document.querySelectorAll("[data-hu]").forEach(b=>b.addEventListener("click",()=>{undoH(S.hDate,b.dataset.hu,+b.dataset.hs)}));
document.getElementById("cm-prev")?.addEventListener("click",()=>{S.calMo--;if(S.calMo<0){S.calMo=11;S.calYr--}R()});
document.getElementById("cm-next")?.addEventListener("click",()=>{S.calMo++;if(S.calMo>11){S.calMo=0;S.calYr++}R()});
document.querySelectorAll("[data-cd]").forEach(el=>el.addEventListener("click",()=>{S.calSel=S.calSel===el.dataset.cd?null:el.dataset.cd;R()}));
document.querySelectorAll("[data-hlog]").forEach(b=>b.addEventListener("click",()=>{const ds=b.dataset.hlog,wk=b.dataset.hwk;
if(wk==="clear"){delete S.hist[ds]}else{const lb={"upperA":"상체 A","lowerA":"하체 A","upperB":"상체 B","lowerB":"하체 B"};S.hist[ds]={workout:wk,label:lb[wk],manual:true}}shi();R()}))}
init();R()
</script>
</body>
</html>
